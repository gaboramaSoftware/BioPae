<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticación</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <div class="auth-container">
        <a class="nav-back" href="../index.html"
               onclick="window.location.href='../index.html'"
               style="border: 2px solid; border-radius: 
               5px; padding: 5px; margin: 20px; display: block;
               text-align: center; color: white;">
                <span class="icon">←</span> Volver al inicio
    </a>
        <div class="logo">
            <div class="logo-icon">
                <i>
                    <image src="../assets/Logo.png" alt="Logo" class="logo-image"
                    style="width: 60px; height: 60px; background-color: darkblue !important;"/>
                </i>
            </div>
            <h1>Autenticación</h1>
            <p>Ingrese sus credenciales para continuar</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="input-group">
                <label for="username">
                    <i>👤</i>
                    Usuario
                </label>
                <input 
                    type="text" 
                    id="username" 
                    class="input-field" 
                    placeholder="usuario@ejemplo.com"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">
                    <i>🔑</i>
                    Contraseña
                </label>
                <div class="password-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        class="input-field" 
                        placeholder="••••••••"
                        required
                    >
                    <button type="button" class="password-toggle" id="togglePassword">
                        👁️
                    </button>
                </div>
                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        Recordarme
                    </label>
                    <a href="credenciales.html" class="forgot-link">¿Olvidó su contraseña?</a>
                </div>
            </div>

            <button type="submit" class="auth-button" id="submitBtn">
                Iniciar Sesión
            </button>
            <a href="credenciales.html" style="display:block;text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted);text-decoration:none;">
                Cambiar credenciales de acceso
            </a>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>
